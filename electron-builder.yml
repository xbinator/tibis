appId: com.tibis.desktop
productName: Tibis
directories:
  buildResources: build
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
extraResources:
  - from: resources/icons
    to: icons
    filter:
      - "**/*"
asar: true
asarUnpack:
  - "**/*.node"
  - node_modules/better-sqlite3/**/*
mac:
  category: public.app-category.productivity
  target:
    - dmg
    - zip
  icon: resources/icons/app.icns
win:
  target:
    - nsis
    - portable
  icon: resources/icons/app.png
linux:
  target:
    - AppImage
    - deb
  icon: resources/icons/app.png
  category: Utility
  maintainer: Tibis contributors <noreply@github.com>
