appId: com.tibis.desktop
productName: Tibis
artifactName: "tibis-${os}-${arch}.${ext}"
directories:
  buildResources: build
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
extraResources:
  - from: resources/icons
    to: icons
    filter:
      - "**/*"
  - from: resources/speech
    to: speech
    filter:
      - "manifest.json"
asar: true
asarUnpack:
  - "**/*.node"
  - node_modules/better-sqlite3/**/*
  - node_modules/node-pty/**/*
mac:
  category: public.app-category.productivity
  target:
    - dmg
    - zip
  icon: resources/icons/app.icns
  fileAssociations:
    - ext: md
      name: Markdown
      description: Markdown 文档
      role: Editor
    - ext: markdown
      name: Markdown
      description: Markdown 文档
      role: Editor
    - ext: txt
      name: 纯文本
      description: 纯文本文档
      role: Editor
    - ext: mdx
      name: MDX
      description: MDX 文档
      role: Editor
    - ext: json
      name: JSON
      description: JSON 文档
      role: Editor
win:
  target:
    - nsis
    - portable
  icon: resources/icons/app.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  selectPerMachineByDefault: false
  allowElevation: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Tibis
  runAfterFinish: true
  artifactName: "tibis-${os}-${arch}-setup.${ext}"
portable:
  artifactName: "tibis-${os}-${arch}-portable.${ext}"
linux:
  target:
    - AppImage
    - deb
  icon: resources/icons/app.png
  category: Utility
  maintainer: tibis contributors <noreply@github.com>
