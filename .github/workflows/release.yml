name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      bump:
        description: 版本升级类型。当提供自定义版本号时，请选择 custom。
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major
          - custom
      version:
        description: 自定义版本号（不带 v 前缀），例如 0.2.0 或 1.0.0-beta.1。
        type: string
        required: false
      body:
        description: Release notes（支持 Markdown）。为空时自动生成。
        type: string
        required: false

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare release ref
    runs-on: ubuntu-latest

    outputs:
      release_ref: ${{ steps.release.outputs.release_ref }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      release_branch: ${{ steps.release.outputs.release_branch }}
      rollback_ref: ${{ steps.release.outputs.rollback_ref }}
      rollback_required: ${{ steps.release.outputs.rollback_required }}
      body: ${{ steps.release.outputs.body }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare tag
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          BUMP: ${{ inputs.bump || '' }}
          VERSION: ${{ inputs.version || '' }}
          BODY: ${{ inputs.body || '' }}
        run: |
          set -euo pipefail
          release_started=0
          rollback_ref=""
          tag_name=""

          rollback_release_side_effects() {
            status=$?

            if [ "$EVENT_NAME" != "workflow_dispatch" ] || [ "$release_started" != "1" ] || [ "$status" -eq 0 ]; then
              return
            fi

            # 手动发版在 prepare 阶段会先推送版本提交和 tag；中断时需要像事务一样撤销这些远程副作用。
            if [ -n "$tag_name" ] && git ls-remote --tags origin "refs/tags/$tag_name" | grep -q .; then
              echo "Deleting remote tag $tag_name..."
              git push origin ":refs/tags/$tag_name" || true
            fi

            if [ -n "$rollback_ref" ]; then
              echo "Resetting branch $REF_NAME to $rollback_ref..."
              git push origin "$rollback_ref:$REF_NAME" --force || true
            fi
          }

          trap rollback_release_side_effects EXIT

          if [ "$EVENT_NAME" = "push" ]; then
            echo "release_ref=$REF_NAME" >> "$GITHUB_OUTPUT"
            echo "tag_name=$REF_NAME" >> "$GITHUB_OUTPUT"
            echo "release_branch=" >> "$GITHUB_OUTPUT"
            echo "rollback_ref=" >> "$GITHUB_OUTPUT"
            echo "rollback_required=false" >> "$GITHUB_OUTPUT"
            echo "body=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$REF_TYPE" != "branch" ]; then
            echo "Manual releases must run from a branch, not $REF_TYPE." >&2
            exit 1
          fi

          release_version="$(node <<'NODE'
          const fs = require('node:fs');

          const packagePath = 'package.json';
          const manifest = JSON.parse(fs.readFileSync(packagePath, 'utf8'));
          const bump = process.env.BUMP;
          const requestedVersion = process.env.VERSION.replace(/^v/, '').trim();
          const versionPattern = /^\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?$/;

          function parseVersion(version) {
            const match = version.match(/^(\d+)\.(\d+)\.(\d+)/);

            if (!match) {
              throw new Error(`Invalid current package version: ${version}`);
            }

            return {
              major: Number(match[1]),
              minor: Number(match[2]),
              patch: Number(match[3]),
            };
          }

          function nextVersion() {
            if (bump === 'custom') {
              if (!versionPattern.test(requestedVersion)) {
                throw new Error('Custom version must look like 0.2.0 or 1.0.0-beta.1.');
              }

              return requestedVersion;
            }

            const current = parseVersion(manifest.version);

            if (bump === 'major') {
              return `${current.major + 1}.0.0`;
            }

            if (bump === 'minor') {
              return `${current.major}.${current.minor + 1}.0`;
            }

            if (bump === 'patch') {
              return `${current.major}.${current.minor}.${current.patch + 1}`;
            }

            throw new Error(`Unsupported bump type: ${bump}`);
          }

          const version = nextVersion();
          manifest.version = version;
          fs.writeFileSync(packagePath, `${JSON.stringify(manifest, null, 2)}\n`);
          process.stdout.write(version);
          NODE
          )"

          tag_name="v$release_version"
          rollback_ref="$(git rev-parse HEAD)"

          if git rev-parse "$tag_name" >/dev/null 2>&1; then
            echo "Tag $tag_name already exists." >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: release $tag_name"
          git tag "$tag_name"
          release_started=1
          git push origin "HEAD:$REF_NAME"
          git push origin "$tag_name"

          echo "release_ref=$tag_name" >> "$GITHUB_OUTPUT"
          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
          echo "release_branch=$REF_NAME" >> "$GITHUB_OUTPUT"
          echo "rollback_ref=$rollback_ref" >> "$GITHUB_OUTPUT"
          echo "rollback_required=true" >> "$GITHUB_OUTPUT"
          echo "body=$BODY" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.name }}
    needs: prepare
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
          - name: Windows
            os: windows-latest
          - name: Linux
            os: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: pnpm

      - name: Install Linux package dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          CXXFLAGS: -std=c++20
          CL: /std:c++20

      - name: Build release packages
        run: pnpm electron:build
        env:
          ELECTRON_BUILDER_BINARIES_MIRROR: https://github.com/electron-userland/electron-builder-binaries/releases/download/
          npm_config_electron_builder_binaries_mirror: https://github.com/electron-userland/electron-builder-binaries/releases/download/

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tibis-${{ matrix.name }}
          if-no-files-found: error
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.blockmap
            release/latest*.yml

  publish:
    name: Publish GitHub Release
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          name: Tibis ${{ needs.prepare.outputs.tag_name }}
          draft: false
          prerelease: ${{ contains(needs.prepare.outputs.tag_name, '-') }}
          files: release-artifacts/*
          body: ${{ needs.prepare.outputs.body }}
          generate_release_notes: ${{ needs.prepare.outputs.body == '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  rollback:
    name: Rollback cancelled manual release
    needs:
      - prepare
      - build
      - publish
    if: ${{ always() && cancelled() && github.event_name == 'workflow_dispatch' && needs.prepare.outputs.rollback_required == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rollback release ref
        env:
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
          RELEASE_BRANCH: ${{ needs.prepare.outputs.release_branch }}
          ROLLBACK_REF: ${{ needs.prepare.outputs.rollback_ref }}
        run: |
          set -euo pipefail

          if [ -n "$TAG_NAME" ] && git ls-remote --tags origin "refs/tags/$TAG_NAME" | grep -q .; then
            echo "Deleting remote tag $TAG_NAME..."
            git push origin ":refs/tags/$TAG_NAME"
          fi

          if [ -n "$RELEASE_BRANCH" ] && [ -n "$ROLLBACK_REF" ]; then
            echo "Resetting branch $RELEASE_BRANCH to $ROLLBACK_REF..."
            git push origin "$ROLLBACK_REF:$RELEASE_BRANCH" --force
          fi
