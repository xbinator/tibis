name: Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Node 22 quality gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check renderer
        run: pnpm exec tsc --noEmit

      - name: Type check Electron main
        run: pnpm electron:build-main

      - name: Lint scripts and components
        run: pnpm exec eslint src --ext .vue,.ts,.tsx,.js,.jsx,.mts

      - name: Lint styles
        run: pnpm exec stylelint 'src/**/*.{vue,less,css}'

      - name: Run tests
        run: pnpm test
